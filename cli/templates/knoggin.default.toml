# ──────────────────────────────────────────────────────────
# Knoggin Configuration
# Generated by `knoggin init`
# Docs: https://github.com/yinka3/knoggin
# ──────────────────────────────────────────────────────────

[profile]
# Which resource profile to boot.
#   "full"        — Everything. Extraction pipeline + agent + file RAG.
#   "extraction"  — NER, entity resolution, connections, facts. No agent.
#   "agent"       — Agent loop + graph tools + file RAG. No extraction models.
mode = "full"


[infra]
# Connection details for required infrastructure.
# Start services with `knoggin start`.
redis_host = "localhost"
redis_port = 6379
memgraph_host = "localhost"
memgraph_port = 7687
chroma_path = "./chroma_data"


[llm]
# LLM provider configuration.
# The actual API key is read from your .env file — not stored here.
provider = "openrouter"           # "openrouter", "openai", "anthropic"
api_key_env = "KNOGGIN_API_KEY"   # Name of the env var holding your key
base_url = "https://openrouter.ai/api/v1"

# Models for each path. Stronger models improve extraction accuracy.
# Leave blank to use provider defaults.
extraction_model = ""
agent_model = ""
merge_model = ""


[models]
# Local ML model configuration.
# These are loaded at startup based on the active profile.
embedding_model = "dunzhang/stella_en_400M_v5"

# Device for ML inference.
#   "auto" — detect GPU, fall back to CPU
#   "cpu"  — force CPU
#   "cuda" — NVIDIA GPU
#   "mps"  — Apple Silicon
device = "auto"

# Thread pool size for blocking operations (embeddings, NER, graph queries).
workers = 4

# LLM fallback for NER (VP-01).
# When false, extraction uses only GLiNER + known entity matching.
# Ambiguous entities default to "General" topic.
# Set false if your schema is specific enough that GLiNER catches most entities.
llm_ner = true


[events]
# Pipeline and agent event telemetry.
# When enabled, events stream to stdout by default.
enabled = false

# Optional: dotted import path to a custom event handler function.
# Signature: (source: str, event: str, data: dict) -> None
# callback = "my_module.my_handler"